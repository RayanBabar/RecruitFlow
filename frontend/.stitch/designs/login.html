<body class="min-h-screen bg-surface-base flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-body">
<div class="sm:mx-auto sm:w-full sm:max-w-md">
<!-- Logo Area -->
<div class="flex justify-center items-center mb-6">
<span class="material-symbols-outlined text-brand-primary text-4xl mr-2" style="font-variation-settings: 'FILL' 1;">work</span>
<span class="font-display text-display text-text-primary tracking-tight">RecruitFlow</span>
</div>
<h2 class="mt-6 text-center font-h1 text-h1 text-text-primary">
            Sign in to your account
        </h2>
<p class="mt-2 text-center font-body text-body text-text-secondary">
            Or
            <a class="font-medium text-brand-primary hover:text-brand-hover transition-colors" href="#">
                start your 14-day free trial
            </a>
</p>
</div>
<div class="mt-8 sm:mx-auto sm:w-full sm:max-w-[440px]">
<div class="bg-surface-card py-8 px-4 shadow-sm border border-border-soft rounded-xl sm:px-10">
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div>
<label class="block font-body text-body font-medium text-text-primary" for="email">
                        Email address
                    </label>
<div class="mt-2 relative rounded-lg shadow-sm">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-secondary text-sm">mail</span>
</div>
<input autocomplete="email" class="block w-full pl-10 pr-3 py-2.5 border border-border-soft rounded-lg bg-surface-container-lowest text-text-primary font-body text-body placeholder:text-text-secondary focus:outline-none focus:ring-2 focus:ring-brand-primary focus:border-transparent transition-shadow" id="email" name="email" placeholder="you@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex items-center justify-between">
<label class="block font-body text-body font-medium text-text-primary" for="password">
                            Password
                        </label>
<div class="text-sm">
<a class="font-body text-body font-medium text-brand-primary hover:text-brand-hover transition-colors" href="#">
                                Forgot password?
                            </a>
</div>
</div>
<div class="mt-2 relative rounded-lg shadow-sm">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-secondary text-sm">lock</span>
</div>
<input autocomplete="current-password" class="block w-full pl-10 pr-3 py-2.5 border border-border-soft rounded-lg bg-surface-container-lowest text-text-primary font-body text-body placeholder:text-text-secondary focus:outline-none focus:ring-2 focus:ring-brand-primary focus:border-transparent transition-shadow" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 text-brand-primary focus:ring-brand-primary border-border-soft rounded text-brand-primary" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body text-body text-text-primary" for="remember-me">
                        Remember me
                    </label>
</div>
<!-- Submit Button -->
<div>
<button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm font-body text-body font-semibold text-on-primary bg-brand-primary hover:bg-brand-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-primary transition-all duration-200 active:scale-[0.98]" type="submit">
                        Sign In
                    </button>
</div>
</form>
<div class="mt-8">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-border-soft"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-surface-card font-micro text-micro text-text-secondary uppercase tracking-wider">
                            Or continue with
                        </span>
</div>
</div>
<div class="mt-6 grid grid-cols-2 gap-4">
<!-- Google Auth -->
<button class="w-full inline-flex justify-center items-center py-2.5 px-4 border border-border-soft rounded-lg shadow-sm bg-surface-card font-body text-body font-medium text-text-primary hover:bg-surface-variant focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-border-soft transition-colors" type="button">
<svg class="h-5 w-5 mr-2" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Google
                    </button>
<!-- GitHub Auth -->
<button class="w-full inline-flex justify-center items-center py-2.5 px-4 border border-border-soft rounded-lg shadow-sm bg-surface-card font-body text-body font-medium text-text-primary hover:bg-surface-variant focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-border-soft transition-colors" type="button">
<svg aria-hidden="true" class="h-5 w-5 mr-2 text-text-primary" fill="currentColor" viewbox="0 0 24 24">
<path clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" fill-rule="evenodd"></path>
</svg>
                        GitHub
                    </button>
</div>
</div>
</div>
<p class="mt-8 text-center font-body text-body text-text-secondary">
            Don't have an account? 
            <a class="font-medium text-brand-primary hover:text-brand-hover transition-colors" href="#">
                Sign up
            </a>
</p>
